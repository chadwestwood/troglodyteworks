name: Production monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  readiness:
    name: Website, database, and Trog worker readiness
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check production readiness
        run: >-
          curl --fail --silent --show-error
          --connect-timeout 10
          --max-time 25
          --retry 2
          --retry-all-errors
          https://troglodyteworks.com/health/ready
