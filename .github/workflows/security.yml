name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Tracked secrets and configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest scripts.test_security_check
      - run: python scripts/security_check.py

  dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pip-audit
      - run: python -m pip_audit --requirement backend/trog/requirements.txt

  backend-tests:
    name: Backend regression suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: twe_app
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: twe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twe_app -d twe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TWE_TEST_DATABASE_URL: postgresql://twe_app:test-password@localhost:5432/twe_test
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/trog/requirements.txt
      - run: python -m pip install --disable-pip-version-check --requirement backend/trog/requirements.txt
      - run: python scripts/migrate_test_database.py
        working-directory: backend/trog
      - run: python -m pytest -q
        working-directory: backend/trog
