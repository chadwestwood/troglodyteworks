<text x="750" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6F746D">Announcements · Roles</text>

<rect x="90" y="370" width="240" height="100" rx="22" fill="#FCFBF7" stroke="#D8D4CA" stroke-width="3"/>
