<text x="210" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6F746D">Nitrado · Bisect · Others</text>

<rect x="630" y="70" width="240" height="100" rx="22" fill="#FCFBF7" stroke="#D8D4CA" stroke-width="3"/>
