<text x="210" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6F746D">Owners · Admins · Mods</text>

<rect x="630" y="370" width="240" height="100" rx="22" fill="#FCFBF7" stroke="#D8D4CA" stroke-width="3"/>
