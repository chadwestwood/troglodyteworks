<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troglodyte Works Design System</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <main class="page-container">

        <h1>Troglodyte Works Design System</h1>

        <p>
            Calm. Simple. Powerful.
        </p>

        <section>
            <h2>Buttons</h2>

            <button>Primary Button</button>
            <button>Secondary Button</button>
            <button>Danger Button</button>
        </section>

        <section>
            <h2>Form Fields</h2>

            <label for="sampleText">Text Field</label>
            <input id="sampleText" type="text" placeholder="Example text field">

            <label for="sampleEmail">Email Field</label>
            <input id="sampleEmail" type="email" placeholder="name@example.com">

            <label for="samplePassword">Password Field</label>
            <input id="samplePassword" type="password" placeholder="Password">
        </section>

        <section>
            <h2>Cards</h2>

            <div class="card">
                <h3>Genesis Server</h3>
                <p>Status: Running</p>
                <button>Manage Server</button>
            </div>
        </section>

        <section>
            <h2>Alerts</h2>

            <p>Success: Your changes were saved.</p>
            <p>Warning: Restarting will temporarily disconnect players.</p>
            <p>Error: The server could not be restarted.</p>
        </section>

    </main>

</body>
</html>
