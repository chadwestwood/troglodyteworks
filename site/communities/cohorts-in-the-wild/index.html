<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cohorts in the Wild | Troglodyte Works</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page" data-page="community">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="/communities/"><span class="brand-mark">TW</span><span>Troglodyte Works</span></a>
      <button class="text-button" type="button" data-sign-out>Sign out</button>
    </header>
    <nav class="breadcrumbs">Home &gt; My Communities &gt; Cohorts in the Wild</nav>
    <main class="app-grid">
      <section class="app-panel">
        <p class="eyebrow">Community</p>
        <h1 data-community-name>Cohorts in the Wild</h1>
        <p class="muted">Your role: <strong data-community-role></strong></p>
        <p class="form-error" data-error hidden></p>
      </section>
      <section class="app-panel">
        <h2>Game Servers</h2>
        <div class="resource-list" data-game-servers-list></div>
      </section>
      <section class="app-panel muted-panel">
        <h2>Recent Activity</h2>
        <p>Unavailable for this milestone.</p>
      </section>
      <section class="app-panel muted-panel">
        <h2>Members and Settings</h2>
        <p>Invite members into Cohorts without granting server or Trog access.</p>
        <a class="primary-button" href="/communities/cohorts-in-the-wild/invitations/">Manage Invitations</a>
      </section>
    </main>
  </div>
  <script src="/js/twe-api.js"></script>
  <script src="/js/twe-pages.js"></script>
</body>
</html>
