<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARK Survival Ascended | Troglodyte Works</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page" data-page="gameServer">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="/communities/"><span class="brand-mark">TW</span><span>Troglodyte Works</span></a>
      <button class="text-button" type="button" data-sign-out>Sign out</button>
    </header>
    <nav class="breadcrumbs">Home &gt; My Communities &gt; Cohorts in the Wild &gt; ARK Survival Ascended</nav>
    <main class="app-grid">
      <section class="app-panel">
        <p class="eyebrow">Game Server</p>
        <h1 data-server-game-type>ARK Survival Ascended</h1>
        <p class="muted"><span data-server-name></span> · <strong data-server-status></strong></p>
        <p class="form-error" data-error hidden></p>
      </section>
      <section class="app-panel">
        <h2>Game Instances</h2>
        <div class="resource-list" data-instances-list></div>
      </section>
    </main>
  </div>
  <script src="/js/twe-api.js"></script>
  <script src="/js/twe-pages.js"></script>
</body>
</html>
