<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Communities | Troglodyte Works</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page" data-page="communities">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="/"><span class="brand-mark">TW</span><span>Troglodyte Works</span></a>
      <nav class="header-actions" aria-label="User navigation">
        <a class="header-link" href="/explore/">Explore</a>
        <button class="text-button" type="button" data-sign-out>Sign out</button>
      </nav>
    </header>
    <nav class="breadcrumbs">Home &gt; My Communities</nav>
    <main class="app-panel">
      <p class="eyebrow">My Communities</p>
      <h1>Communities for <span data-current-user></span></h1>
      <p class="form-error" data-error hidden></p>
      <div class="resource-list" data-communities-list></div>
      <section class="empty-state" data-empty-communities hidden>
        <h2>You have not joined any Communities yet.</h2>
        <p class="muted">Your account is ready. Community Membership is separate from account creation.</p>
        <div class="button-row">
          <a class="primary-button" href="/explore/">Explore public content</a>
          <button class="primary-button secondary" type="button" disabled>Join with an invitation</button>
          <button class="primary-button secondary" type="button" disabled>Create a Community - future</button>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/twe-api.js"></script>
  <script src="/js/twe-pages.js"></script>
</body>
</html>
