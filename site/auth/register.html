<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account | Troglodyte Works</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
</head>

<body class="app-page" data-page="register">
  <main class="app-shell narrow">
    <a class="brand" href="/" aria-label="Troglodyte Works home">
      <span class="brand-mark" aria-hidden="true">TW</span>
      <span>Troglodyte Works</span>
    </a>
    <nav class="auth-nav" aria-label="Visitor navigation">
      <a class="header-link" href="/explore/">Explore</a>
      <a class="header-link" href="/auth/sign-in.html">Sign In</a>
    </nav>
    <section class="app-panel">
      <p class="eyebrow">Create Account</p>
      <h1>Set up your identity first.</h1>
      <p class="muted">After creating an account, you can join a community through invitation and open its operations
        workspace.</p>
      <p class="form-error" data-error hidden></p>
      <div class="button-row">
        <a class="primary-button" href="/api/v1/auth/google/start" data-oauth-start="google">Continue with Google</a>
        <a class="primary-button secondary" href="/api/v1/auth/discord/start" data-oauth-start="discord">Continue with
          Discord</a>
      </div>
      <form class="stack-form" data-register-form>
        <label for="display_name">Display name</label>
        <input id="display_name" name="display_name" type="text" autocomplete="name" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
        <label for="password_confirmation">Confirm password</label>
        <input id="password_confirmation" name="password_confirmation" type="password" autocomplete="new-password"
          minlength="8" required>
        <button class="primary-button" type="submit">Create Account</button>
      </form>
      <p class="muted">Already have an account? <a class="header-link" href="/auth/sign-in.html">Sign In</a> and
        continue where you left off.</p>
    </section>
  </main>
  <script src="/js/twe-api.js?v=site-admin-v2"></script>
  <script src="/js/twe-pages.js?v=site-admin-v2"></script>
</body>

</html>
