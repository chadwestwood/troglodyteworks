<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troglodyte Works | Register</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <main class="register-container">

        <h1>Create Your Account</h1>

        <p>
            Create a Troglodyte Works account to manage your game servers.
        </p>

        <form id="registerForm">

            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                required
            >

            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
            >

            <label for="confirmPassword">Confirm Password</label>
            <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

    </main>

</body>
</html>
